{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="content">
  <div class="container-fluid">

    <h4 class="page-title">Program</h4>

    <div class="row">
      <div class="col-md-12">

        <div class="card">

          <div class="card-header">
            <div class="card-title">
              {% if object %}
              Update Program
              {% else %}
              Add New Program
              {% endif %}
            </div>
            <div class="card-category">Program Information</div>
          </div>

          <div class="col-md-6">

            <div class="card-body">

              <form action="" method="post" novalidate>

                {% csrf_token %}

                {% include 'includes/form.html' %}

                <div class="form-group">
                  <button type="submit" class="btn btn-primary btn-rounded">
                    Submit
                  </button>
                </div>

              </form>

            </div>

          </div>

        </div>

      </div>
    </div>

  </div>
</div>

{% endblock %}
